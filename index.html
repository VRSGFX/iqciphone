<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IQC iPhone · Gojo Vip</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0A0A0F;
            color: #FFFFFF;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ANIMATIONS SMOOTH */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes softGlow {
            0% { text-shadow: 0 0 2px rgba(220, 38, 38, 0.2); }
            100% { text-shadow: 0 0 6px rgba(220, 38, 38, 0.45); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.3); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* TOP BAR */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 0;
            margin-bottom: 20px;
            animation: fadeInDown 0.5s ease;
        }

        .top-bar-content {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        .page-title {
            font-size: 18px;
            font-weight: 700;
            color: #FFFFFF;
        }

        .page-title span {
            color: #dc2626;
            animation: softGlow 2s ease-in-out infinite alternate;
        }

        /* BANNER */
        .banner {
            position: relative;
            height: 170px;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeInUp 0.5s ease;
            transition: all 0.2s ease;
        }

        .banner:hover {
            transform: translateY(-2px);
        }

        .banner-img {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://files.catbox.moe/288fco.jpg');
            background-size: cover;
            background-position: center;
            transition: transform 0.4s ease;
        }

        .banner:hover .banner-img {
            transform: scale(1.03);
        }

        .banner-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.25), rgba(0, 0, 0, 0.75));
            z-index: 1;
        }

        .banner-content {
            position: relative;
            z-index: 2;
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .banner-text h2 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .banner-text p {
            color: #C0C0C0;
            font-size: 13px;
        }

        .text-red {
            color: #dc2626;
            font-weight: 700;
        }

        .banner-stats {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .banner-stat {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .banner-stat:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .banner-stat i {
            color: #dc2626;
        }

        /* INFO CARD */
        .info-card {
            background: #121218;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            animation: fadeInUp 0.5s ease 0.05s both;
            transition: all 0.2s ease;
        }

        .info-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .info-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .info-header i {
            font-size: 24px;
            color: #dc2626;
            animation: softGlow 2s ease-in-out infinite alternate;
        }

        .info-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .info-desc {
            font-size: 14px;
            color: #8A94A6;
            margin-bottom: 15px;
            padding-left: 36px;
        }

        .info-stats {
            display: flex;
            gap: 15px;
        }

        .info-stat {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 12px;
        }

        .info-stat span {
            font-size: 11px;
            color: #8A94A6;
            display: block;
            margin-bottom: 4px;
        }

        .info-stat strong {
            font-size: 16px;
            color: #dc2626;
        }

        /* INPUT CARD */
        .input-card {
            background: #121218;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            animation: fadeInUp 0.5s ease 0.1s both;
            transition: all 0.2s ease;
        }

        .input-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .input-box {
            margin-bottom: 16px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8A94A6;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .cyber-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: #0A0A0F;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 3px solid #dc2626;
            border-radius: 18px;
            color: #FFFFFF;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .cyber-input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.15);
        }

        .cyber-input:focus + i {
            color: #dc2626;
        }

        /* TOMBOL GENERATE */
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            border: none;
            border-radius: 18px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn i {
            font-size: 18px;
        }

        /* LOADING */
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(220, 38, 38, 0.1);
            border-top: 3px solid #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        /* RESULT CARD */
        .result-card {
            background: #121218;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: none;
            animation: fadeInUp 0.5s ease;
            transition: all 0.2s ease;
            text-align: center;
        }

        .result-card.active {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .result-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #dc2626;
        }

        .result-title i {
            animation: pulse 2s infinite;
        }

        .result-img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.2s ease;
        }

        .result-img:hover {
            transform: scale(1.02);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .download-btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            border: none;
            border-radius: 18px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
        }

        .back-btn {
            flex: 1;
            padding: 12px;
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 18px;
            color: #dc2626;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(220, 38, 38, 0.15);
            transform: translateY(-2px);
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 20px;
            padding-bottom: 20px;
            font-size: 12px;
            color: #8A94A6;
            animation: fadeInUp 0.5s ease 0.15s both;
        }

        .footer a {
            color: #dc2626;
            text-decoration: none;
        }

        /* BOTTOM BAR */
        .bottom-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 65px;
            background: rgba(18, 18, 24, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            z-index: 100;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo-app {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-app i {
            font-size: 22px;
            color: #dc2626;
        }

        .logo-app span {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .status-badge-bottom {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.2);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #dc2626;
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            left: 20px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: #121218;
            border-left: 3px solid #dc2626;
            border-radius: 14px;
            padding: 14px 18px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            pointer-events: auto;
            max-width: 400px;
            margin-left: auto;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.warning {
            border-left-color: #f59e0b;
        }

        .toast-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .toast-header i {
            font-size: 16px;
            color: #dc2626;
        }

        .toast.warning .toast-header i {
            color: #f59e0b;
        }

        .toast-header h4 {
            font-size: 13px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .toast p {
            font-size: 12px;
            color: #8A94A6;
            margin-left: 28px;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1A1A;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-content">
            <div class="page-title">
                IQC <span>IPHONE</span>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- BANNER -->
        <div class="banner">
            <div class="banner-img"></div>
            <div class="banner-overlay"></div>
            <div class="banner-content">
                <div class="banner-text">
                    <h2>IQC <span class="text-red">iPhone</span></h2>
                    <p>Buat quote iPhone keren</p>
                </div>
                <div class="banner-stats">
                    <div class="banner-stat">
                        <i class="fa-regular fa-clock"></i>
                        <span>GRATIS</span>
                    </div>
                    <div class="banner-stat">
                        <i class="fa-solid fa-bolt"></i>
                        <span>CEPAT</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- INFO CARD -->
        <div class="info-card">
            <div class="info-header">
                <i class="fa-solid fa-circle-info"></i>
                <h2>INFORMASI</h2>
            </div>
            <div class="info-desc">
                Buat pesan WhatsApp seperti iPhone,bisa pake mentahan jj kalian.
            </div>
            <div class="info-stats">
                <div class="info-stat">
                    <span>STATUS</span>
                    <strong>ONLINE</strong>
                </div>
                <div class="info-stat">
                    <span>@CENTRALVEX</span>
                    <strong>IQC IP</strong>
                </div>
            </div>
        </div>

        <!-- INPUT CARD -->
        <div class="input-card">
            <div class="input-box">
                <div class="input-wrapper">
                    <i class="fa-regular fa-clock"></i>
                    <input type="text" class="cyber-input" id="time" placeholder="Jam (contoh: 18:00)">
                </div>
            </div>

            <div class="input-box">
                <div class="input-wrapper">
                    <i class="fa-solid fa-battery-full"></i>
                    <input type="number" class="cyber-input" id="battery" placeholder="Baterai (%)" min="0" max="100">
                </div>
            </div>

            <div class="input-box">
                <div class="input-wrapper">
                    <i class="fa-solid fa-sim-card"></i>
                    <input type="text" class="cyber-input" id="carrier" placeholder="Merek Kartu (contoh: Indosat)">
                </div>
            </div>

            <div class="input-box">
                <div class="input-wrapper">
                    <i class="fa-regular fa-message"></i>
                    <input type="text" class="cyber-input" id="message" placeholder="Teks Pesan">
                </div>
            </div>

            <button class="generate-btn" id="generateBtn">
                <i class="fa-solid fa-mobile-screen-button"></i>
                BUAT GAMBAR
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="color: #8A94A6; font-size: 13px;">Memproses gambar...</p>
            </div>
        </div>

        <!-- RESULT CARD -->
        <div class="result-card" id="resultCard">
            <div class="result-header">
                <div class="result-title">
                    <i class="fa-solid fa-image"></i>
                    <span>Hasil Gambar</span>
                </div>
            </div>
            <img class="result-img" id="hasilImg" src="" alt="Hasil IQC iPhone">
            <div class="btn-group">
                <a id="downloadBtn" class="download-btn" download="iqc-iphone.jpg">
                    <i class="fa-solid fa-download"></i>
                    Download
                </a>
                <button class="back-btn" id="backBtn">
                    <i class="fa-solid fa-arrow-left"></i>
                    Kembali
                </button>
            </div>
        </div>

        <div class="footer">
            © 2026 · <a href="https://t.me/CENTRALVEX" target="_blank">GojoVipApp</a>
        </div>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
        <div class="logo-app">
            <i class="fa-solid fa-mobile-screen-button"></i>
            <span>IQC IPHONE</span>
        </div>
        <div class="status-badge-bottom">
            <i class="fa-regular fa-circle-check"></i> READY
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // TOAST
        const toastContainer = document.getElementById('toastContainer');
        
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'warning' ? 'warning' : ''}`;
            
            const icon = type === 'warning' ? 'fa-triangle-exclamation' : 'fa-circle-info';
            const title = type === 'warning' ? 'PERINGATAN' : 'INFORMASI';
            
            toast.innerHTML = `
                <div class="toast-header">
                    <i class="fa-solid ${icon}"></i>
                    <h4>${title}</h4>
                </div>
                <p>${message}</p>
            `;
            
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        // ELEMENTS
        const generateBtn = document.getElementById('generateBtn');
        const backBtn = document.getElementById('backBtn');
        const loading = document.getElementById('loading');
        const resultCard = document.getElementById('resultCard');
        const hasilImg = document.getElementById('hasilImg');
        const downloadBtn = document.getElementById('downloadBtn');
        
        const timeInput = document.getElementById('time');
        const batteryInput = document.getElementById('battery');
        const carrierInput = document.getElementById('carrier');
        const messageInput = document.getElementById('message');

        let currentImageUrl = '';

        function buatGambar() {
            const time = timeInput.value.trim();
            const battery = batteryInput.value.trim();
            const carrier = carrierInput.value.trim();
            const message = messageInput.value.trim();
            
            if (!time) {
                showToast('Masukkan jam!', 'warning');
                return;
            }
            
            if (!battery) {
                showToast('Masukkan baterai!', 'warning');
                return;
            }
            
            if (parseInt(battery) < 0 || parseInt(battery) > 100) {
                showToast('Baterai harus 0-100!', 'warning');
                return;
            }
            
            if (!carrier) {
                showToast('Masukkan merek kartu!', 'warning');
                return;
            }
            
            if (!message) {
                showToast('Masukkan teks pesan!', 'warning');
                return;
            }
            
            // SHOW LOADING
            loading.style.display = 'block';
            resultCard.classList.remove('active');
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> MEMPROSES...';
            
            const encodedMessage = encodeURIComponent(message);
            const url = `https://brat.siputzx.my.id/iphone-quoted?time=${encodeURIComponent(time)}&batteryPercentage=${battery}&carrierName=${encodeURIComponent(carrier)}&messageText=${encodedMessage}&emojiStyle=apple`;
            
            currentImageUrl = url;
            hasilImg.src = url;
            
            hasilImg.onload = () => {
                downloadBtn.href = url;
                loading.style.display = 'none';
                resultCard.classList.add('active');
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="fa-solid fa-mobile-screen-button"></i> BUAT GAMBAR';
                showToast('Gambar berhasil dibuat!');
            };
            
            hasilImg.onerror = () => {
                loading.style.display = 'none';
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="fa-solid fa-mobile-screen-button"></i> BUAT GAMBAR';
                showToast('Gagal memuat gambar, coba lagi!', 'warning');
            };
        }

        function kembali() {
            resultCard.classList.remove('active');
            timeInput.value = '';
            batteryInput.value = '';
            carrierInput.value = '';
            messageInput.value = '';
        }

        // EVENT LISTENERS
        generateBtn.addEventListener('click', buatGambar);
        backBtn.addEventListener('click', kembali);
        
        // ENTER KEY SUPPORT
        const inputs = [timeInput, batteryInput, carrierInput, messageInput];
        inputs.forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') buatGambar();
            });
        });
    </script>
</body>
</html>
